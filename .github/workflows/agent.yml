name: Night Agent

# Runs the autonomous task agent on a real Linux VM, so Playwright/Chromium
# work natively — no browserless, no paid host. The dashboard lives on Vercel;
# this job just connects to the same Supabase and processes the queue.

on:
  schedule:
    - cron: '0 4 * * *' # nightly at 04:00 UTC (matches vercel.json)
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab

# Avoid two runs overlapping (a manual run during the scheduled one).
concurrency:
  group: night-agent
  cancel-in-progress: false

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Supabase (agent writes with the service-role key, bypassing RLS)
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # LLM (Groq primary, OpenRouter fallback)
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
      # Web search
      BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
      # Embeddings (optional — semantic workflow matching)
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
      # Connectors (optional — Gmail + Calendar)
      CONNECTOR_ENCRYPTION_KEY: ${{ secrets.CONNECTOR_ENCRYPTION_KEY }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      # Email notifications (optional)
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium + system deps for Playwright
        run: npx playwright install --with-deps chromium

      - name: Run the night agent
        run: npm run agent:run
